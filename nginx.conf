worker_processes auto;
error_log stderr warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # Basic Settings
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100M; # Zvýšeno pro nahrávání velkých CSV/PDF souborů

    server {
        listen 8080;
        server_name _;
        root /var/www/html/public; # Sem přijde build frontendu
        index index.html;

        # 1. API Requests -> Starý i Nový Backend (PHP)
        # Příklad: /api/v3/api-import.php -> /var/www/html/v3/api-import.php
        location /api/ {
            alias /var/www/html/; 
            try_files $uri $uri/ =404;

            location ~ \.php$ {
                include fastcgi_params;
                fastcgi_pass unix:/run/php-fpm.sock;
                fastcgi_param SCRIPT_FILENAME $request_filename;
                fastcgi_index index.php;
                # CORS pro vývoj
                add_header 'Access-Control-Allow-Origin' '*' always;
            }
        }

        # 2. Frontend Requests -> React (Single Page App)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Deny hidden files like .env
        location ~ /\. {
            deny all;
        }
    }
}
